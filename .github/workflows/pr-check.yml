# ============================================
# Flash Sale Platform - PR Validation Workflow
# Week 7 Day 2: CI/CD Pipeline & GitHub Actions
# ============================================

name: PR Validation

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # -- PR Quality Checks -----------------------
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check backend
        run: npx tsc --noEmit --project backend/tsconfig.json

      - name: Run tests
        run: npm test --workspace=backend -- --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-pr-check

      - name: Build check
        run: |
          npm run build --workspace=backend
          npm run build --workspace=frontend
        env:
          VITE_API_URL: /api

  # -- Bundle Size Analysis --------------------
  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build --workspace=frontend
        env:
          VITE_API_URL: /api

      - name: Report bundle size
        run: |
          echo "## Frontend Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh frontend/dist/ >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          find frontend/dist/assets -name '*.js' -o -name '*.css' | head -20 | while read f; do
            echo "$(du -sh "$f")" >> $GITHUB_STEP_SUMMARY
          done
          echo '```' >> $GITHUB_STEP_SUMMARY

  # -- Conventional Commit Check ---------------
  commit-check:
    name: Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        run: |
          echo "## Commit Message Validation" >> $GITHUB_STEP_SUMMARY
          VALID=true
          git log --format='%s' origin/${{ github.base_ref }}..HEAD | while read msg; do
            if echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'; then
              echo "? $msg" >> $GITHUB_STEP_SUMMARY
            else
              echo "?? Non-conventional: $msg" >> $GITHUB_STEP_SUMMARY
            fi
          done
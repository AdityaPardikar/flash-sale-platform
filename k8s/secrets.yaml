# ============================================
# Flash Sale Platform - Secrets
# Week 5 Day 6: DevOps & Containerization
# ============================================
# NOTE: In production, use sealed-secrets or external secret management

apiVersion: v1
kind: Secret
metadata:
  name: flash-sale-secrets
  namespace: flash-sale
  labels:
    app.kubernetes.io/name: flash-sale
type: Opaque
stringData:
  # Replace these with actual secrets in production
  JWT_SECRET: 'your-super-secret-jwt-key-change-in-production'
  DB_USER: 'flash_user'
  DB_PASSWORD: 'flash_password'
  REDIS_PASSWORD: ''

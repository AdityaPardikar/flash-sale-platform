# ============================================
# Flash Sale Platform - Redis Deployment
# Week 5 Day 6: DevOps & Containerization
# ============================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: flash-sale
  labels:
    app.kubernetes.io/name: flash-sale
    app.kubernetes.io/component: redis
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: flash-sale-redis
  template:
    metadata:
      labels:
        app: flash-sale-redis
        app.kubernetes.io/name: flash-sale
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - --appendonly
            - 'yes'
            - --maxmemory
            - '512mb'
            - --maxmemory-policy
            - 'allkeys-lru'
          resources:
            requests:
              memory: '256Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ['ReadWriteOnce']
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: flash-sale
  labels:
    app.kubernetes.io/name: flash-sale
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: flash-sale-redis

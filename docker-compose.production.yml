# ============================================
# Flash Sale Platform - Production Docker Compose
# Week 7 Day 1: Docker Production Optimization
# ============================================
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.production.yml up -d
# ============================================

version: '3.9'

services:
  # ── PostgreSQL (Production) ──────────────────
  postgres:
    restart: always
    environment:
      POSTGRES_INITDB_ARGS: '--data-checksums'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c max_connections=200
      -c log_min_duration_statement=1000
      -c log_checkpoints=on
      -c log_connections=on
      -c log_disconnections=on
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'
        tag: 'postgres'

  # ── Redis (Production) ──────────────────────
  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 384mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 300
      --save 900 1
      --save 300 10
      --save 60 10000
      --loglevel warning
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'
        tag: 'redis'

  # ── Backend API (Production) ────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.production
      target: backend-production
      args:
        - NODE_ENV=production
    restart: always
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      ENABLE_METRICS: 'true'
      ENABLE_TRACING: 'true'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
      replicas: 1
    logging:
      driver: 'json-file'
      options:
        max-size: '20m'
        max-file: '10'
        tag: 'backend'
    # Remove debug port mapping
    ports:
      - '${API_PORT:-3000}:3000'

  # ── Frontend / Nginx (Production) ───────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.production
      target: frontend-production
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M
    # Uncomment for SSL:
    # volumes:
    #   - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - '${WEB_PORT:-80}:80'
      # - '443:443'  # Uncomment for SSL
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'
        tag: 'nginx'
